<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Genesis | Guerra de Tribus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-primary-bg text-stone-100 flex items-center justify-center min-h-[100dvh] font-sans antialiased">

    <div id="village-container" class="w-full max-w-md h-[100dvh] bg-glass-bg rounded-none md:rounded-[2rem] shadow-2xl border border-primary-border flex flex-col overflow-hidden backdrop-blur-2xl">
        
        <header id="app-header" class="relative z-30 p-1.5 flex-shrink-0 flex justify-between items-center bg-glass-light-bg backdrop-blur-2xl border-b border-contrast-border md:rounded-t-[2rem] shadow-inner">
            <button id="open-config-menu-btn" type="button" class="icon-medallion w-10 h-10 cursor-pointer" aria-label="Abrir configuracion de partida" title="Configuracion de partida">
                 <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-war-mist" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3.25l7.25 3.25v4.8c0 4.55-2.95 7.85-7.25 9.45-4.3-1.6-7.25-4.9-7.25-9.45V6.5L12 3.25z"/><path stroke-linecap="round" stroke-linejoin="round" d="M8.75 11.25h6.5M12 8v7.5"/></svg>
            </button>
            <div id="village-selector" class="relative">
                <div class="flex min-h-10 items-center gap-1.5 font-display font-bold text-sm text-war-mist rounded-xl px-2.5 py-1.5 bg-glass-bg border border-primary-border cursor-pointer hover:bg-btn-secondary-hover transition-colors shadow-lg backdrop-blur-xl">
                    <span id="village-name-display">Cargando...</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-war-gold" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                </div>
                <ul id="village-dropdown" class="hidden absolute top-full left-1/2 -translate-x-1/2 mt-2 w-72 max-w-[88vw] bg-glass-bg border border-primary-border rounded-xl shadow-2xl z-50 py-1 backdrop-blur-md">
                </ul>
            </div>
            <div class="icon-medallion w-10 h-10 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-war-mist" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M7 11.5V9a5 5 0 0110 0v2.5"/><path stroke-linecap="round" stroke-linejoin="round" d="M5.5 11.5h13l-1.2 7.25A2.5 2.5 0 0114.85 21h-5.7a2.5 2.5 0 01-2.45-2.25L5.5 11.5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 15h6"/></svg>
            </div>
        </header>

        <div id="resource-bar" class="px-2 py-2 grid grid-cols-4 gap-2 text-xs">
        </div>

        <main id="app-root" class="flex-grow w-full relative overflow-y-auto">
        </main>

        <footer id="app-footer" class="p-1 flex-shrink-0 flex flex-col gap-1 bg-glass-light-bg backdrop-blur-2xl border-t border-contrast-border md:rounded-b-[2rem] shadow-inner">
             <div class="flex justify-between items-center px-1">
                <div class="flex min-h-9 items-center justify-center gap-1.5 px-2 rounded-lg bg-glass-bg border border-primary-border min-w-20 cursor-pointer shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-war-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.653-.125-1.273-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.653.125-1.273.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span id="population-display" class="text-xs font-mono tabular-nums">0</span>
                </div>
                <div id="activity-overview-btn" class="flex min-h-9 items-center justify-center gap-1.5 px-2 rounded-lg bg-glass-bg border border-primary-border min-w-24 cursor-pointer shadow-inner hover:border-war-gold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-orange-300"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                    <span class="text-xs font-bold">Actividad</span>
                </div>
            </div>
             <nav id="main-nav" class="flex justify-around items-center bg-glass-bg rounded-2xl p-1 border border-primary-border shadow-lg backdrop-blur-xl">
                <button id="download-ai-log-btn" class="nav-button" aria-label="Pantalla completa"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M4 9V5a1 1 0 011-1h4M15 4h4a1 1 0 011 1v4M20 15v4a1 1 0 01-1 1h-4M9 20H5a1 1 0 01-1-1v-4" /></svg><span>Pantalla</span></button>
                <a href="/reports" data-route="/reports" class="nav-button relative" aria-label="Informes"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M7 4.5h10l1.5 2v13l-2-1.25-2 1.25-2-1.25-2 1.25-2-1.25-2 1.25v-13l1.5-2z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 9h6M9 12.5h6M9 16h3"/></svg><span>Informes</span><div id="unread-reports-badge" class="hidden absolute top-0 right-0 w-4 h-4 rounded-full bg-war-blood text-white text-xs flex items-center justify-center ring-2 ring-war-ash"></div></a>
                <a href="/village" data-route="/village" class="nav-button" aria-label="Campos"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7.5c3-1.8 5.8-1.8 8.5 0 2.6 1.7 5.1 1.7 7.5 0M4 12c3-1.8 5.8-1.8 8.5 0 2.6 1.7 5.1 1.7 7.5 0M4 16.5c3-1.8 5.8-1.8 8.5 0 2.6 1.7 5.1 1.7 7.5 0"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 5v14M13 5v14M19 5v14"/></svg><span>Campos</span></a>
                <a href="/village-center" data-route="/village-center" class="nav-button" aria-label="Aldea"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M4 20h16M6 20V9l6-4 6 4v11"/><path stroke-linecap="round" stroke-linejoin="round" d="M10 20v-6h4v6M8.5 11.5h1.5M14 11.5h1.5"/></svg><span>Aldea</span></a>
                <a href="/map" data-route="/map" class="nav-button" aria-label="Mapa"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18l-5 2V6l5-2 6 2 5-2v14l-5 2-6-2z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 4v14M15 6v14"/></svg><span>Mapa</span></a>
            </nav>
        </footer>
        
        <div id="building-tooltip" class="hidden fixed z-[2147483647] px-3 py-1.5 text-sm font-semibold text-white bg-gray-900/80 backdrop-blur-sm rounded-md shadow-lg pointer-events-none"></div>

    </div>

    <div id="confirm-dialog" class="hidden fixed inset-0 h-[100dvh] bg-primary-bg/80 backdrop-blur-sm flex items-start sm:items-center justify-center overflow-y-auto p-2 sm:p-4 z-50">
        <div class="bg-glass-bg border-2 border-primary-border rounded-2xl shadow-2xl p-6 w-full max-w-sm text-center my-2 sm:my-4">
            <h3 class="text-xl font-display font-bold text-war-gold">Sobrescribir Partida</h3>
            <p class="text-gray-300 my-4">Ya existe una partida guardada. ¿Estás seguro de que quieres borrarla y empezar una nueva? Esta acción no se puede deshacer.</p>
            <div class="flex justify-center gap-4">
                <button id="confirm-cancel" class="px-6 py-3 rounded-xl bg-btn-secondary-bg hover:bg-btn-secondary-hover text-white font-semibold border border-primary-border">Cancelar</button>
                <button id="confirm-overwrite" class="px-6 py-3 rounded-xl bg-war-blood hover:bg-red-700 text-white font-semibold border border-red-400/50">Sí, empezar de cero</button>
            </div>
        </div>
    </div>
    
    <div id="activity-modal" class="panel-hidden fixed inset-0 h-[100dvh] z-40 bg-glass-bg backdrop-blur-md shadow-2xl border-2 border-primary-border flex flex-col md:max-w-md md:h-auto md:inset-auto md:bottom-24 md:left-1/2 md:-translate-x-1/2 md:rounded-2xl">
        <header class="flex-shrink-0 p-4 border-b border-primary-border flex items-center justify-between">
            <h2 class="text-xl font-display font-bold text-war-gold">Resumen de Actividad</h2>
            <button id="activity-modal-close-btn" class="min-h-11 min-w-11 text-gray-400 text-3xl leading-none hover:text-white" aria-label="Cerrar">×</button>
        </header>
        
        <nav class="flex-shrink-0 p-2 border-b border-primary-border/50 flex gap-1 overflow-x-auto whitespace-nowrap">
            <button data-tab="activity" class="tab-button active px-4 py-2 rounded-md text-sm font-semibold transition-colors">Actividad</button>
            <button data-tab="recruitment" class="tab-button px-4 py-2 rounded-md text-sm font-semibold transition-colors">Reclutamiento</button>
            <button data-tab="troops" class="tab-button px-4 py-2 rounded-md text-sm font-semibold transition-colors">Tropas</button>
            <button data-tab="movements" class="tab-button px-4 py-2 rounded-md text-sm font-semibold transition-colors">Movimientos</button>
        </nav>

        <main class="flex-grow overflow-y-auto p-4">
            <div id="tab-panel-activity" class="tab-panel">
                <h3 class="text-lg font-display font-semibold text-war-gold mb-3">Construcción</h3>
                <div id="construction-queue-container"></div>

                <div id="research-queue-wrapper">
                    <h3 class="text-lg font-display font-semibold text-war-gold mt-4 mb-3">Investigación</h3>
                    <div id="research-queue-container"></div>
                </div>

                <div id="smithy-queue-wrapper">
                    <h3 class="text-lg font-display font-semibold text-war-gold mt-4 mb-3">Mejoras de Herrería</h3>
                    <div id="smithy-queue-container"></div>
                </div>
            </div>

            <div id="tab-panel-recruitment" class="tab-panel hidden">
            </div>

            <div id="tab-panel-troops" class="tab-panel hidden">
            </div>

            <div id="tab-panel-movements" class="tab-panel hidden">
            </div>
        </main>
    </div>

    <div id="toast-container"></div>
    
    <script src="/src/app/main.js" type="module"></script>
</body>
</html>
